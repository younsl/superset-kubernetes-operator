# Production-mode sample. Secrets are referenced via *From fields.
# See docs/installation.md for full setup instructions.
#
# Prerequisites:
#   kubectl create secret generic superset-secret \
#     --from-literal=secret-key="$(openssl rand -base64 42)"
#   kubectl create secret generic superset-db \
#     --from-literal=connection-string="postgresql+psycopg2://superset:CHANGEME@postgres:5432/superset"
#   kubectl create secret generic valkey-credentials \
#     --from-literal=password="CHANGEME"
apiVersion: superset.apache.org/v1alpha1
kind: Superset
metadata:
  name: superset
spec:
  image:
    tag: "6.0.1"
  secretKeyFrom:
    name: superset-secret
    key: secret-key
  metastore:
    uriFrom:
      name: superset-db
      key: connection-string
  valkey:
    host: valkey.default.svc
    passwordFrom:
      name: valkey-credentials
      key: password
  deploymentTemplate:
    revisionHistoryLimit: 3
  podTemplate:
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    container:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: false # Superset needs /tmp and /app writes
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
  webServer:
    replicas: 2
    service:
      type: ClusterIP
  celeryWorker:
    replicas: 2
  celeryBeat: {}
  lifecycle: {}
