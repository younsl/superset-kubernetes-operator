# WARNING: This sample uses dev mode with inline secrets for local development only.
# For production, see superset_v1alpha1_superset_prod.yaml.
apiVersion: superset.apache.org/v1alpha1
kind: Superset
metadata:
  labels:
    app.kubernetes.io/name: superset-kubernetes-operator
    app.kubernetes.io/managed-by: kustomize
  name: superset-sample
spec:
  image:
    tag: latest-dev
  environment: dev
  secretKey: thisIsNotSecure_changeInProduction!
  metastore:
    uri: postgresql+psycopg2://superset:superset@postgres:5432/superset
  valkey:
    host: valkey
  config: |
    FEATURE_FLAGS = {
        "ENABLE_TEMPLATE_PROCESSING": True,
    }
  webServer: {}
  lifecycle:
    init:
      adminUser: {}
      loadExamples: true
