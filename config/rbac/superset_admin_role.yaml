# This rule is not used by the project superset-kubernetes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over superset.apache.org.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: superset-kubernetes-operator
    app.kubernetes.io/managed-by: kustomize
  name: superset-admin-role
rules:
- apiGroups:
  - superset.apache.org
  resources:
  - supersets
  - supersetcelerybeats
  - supersetceleryflowers
  - supersetceleryworkers
  - supersettasks
  - supersetmcpservers
  - supersetwebservers
  - supersetwebsocketservers
  verbs:
  - '*'
- apiGroups:
  - superset.apache.org
  resources:
  - supersets/status
  - supersetcelerybeats/status
  - supersetceleryflowers/status
  - supersetceleryworkers/status
  - supersettasks/status
  - supersetmcpservers/status
  - supersetwebservers/status
  - supersetwebsocketservers/status
  verbs:
  - get
