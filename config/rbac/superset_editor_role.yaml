# This rule is not used by the project superset-kubernetes-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the superset.apache.org.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: superset-kubernetes-operator
    app.kubernetes.io/managed-by: kustomize
  name: superset-editor-role
rules:
- apiGroups:
  - superset.apache.org
  resources:
  - supersets
  - supersetcelerybeats
  - supersetceleryflowers
  - supersetceleryworkers
  - supersettasks
  - supersetmcpservers
  - supersetwebservers
  - supersetwebsocketservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - superset.apache.org
  resources:
  - supersets/status
  - supersetcelerybeats/status
  - supersetceleryflowers/status
  - supersetceleryworkers/status
  - supersettasks/status
  - supersetmcpservers/status
  - supersetwebservers/status
  - supersetwebsocketservers/status
  verbs:
  - get
