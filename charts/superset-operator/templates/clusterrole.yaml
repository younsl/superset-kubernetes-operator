apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "superset-operator.fullname" . }}-manager
  labels:
    {{- include "superset-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps, serviceaccounts, services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [create, delete, get, list, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [gateway.networking.k8s.io]
    resources: [httproutes]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [superset.apache.org]
    resources: [supersets]
    verbs: [get, list, watch]
  - apiGroups: [superset.apache.org]
    resources: [supersetcelerybeats, supersetceleryflowers, supersetceleryworkers, supersettasks, supersetmcpservers, supersetwebservers, supersetwebsocketservers]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [superset.apache.org]
    resources: [supersetcelerybeats/status, supersetceleryflowers/status, supersetceleryworkers/status, supersettasks/status, supersetmcpservers/status, supersetwebservers/status, supersetwebsocketservers/status]
    verbs: [get, patch, update]
  - apiGroups: [superset.apache.org]
    resources: [supersets/status]
    verbs: [get, patch, update]
