image:
  # -- Docker image repository for the operator manager.
  repository: ghcr.io/apache/superset-kubernetes-operator
  # -- Image tag. Defaults to the chart's appVersion when empty.
  tag: ""  # defaults to .Chart.AppVersion
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Number of operator manager replicas.
replicas: 1

# -- Number of old ReplicaSets to retain for rollback. Leave unset to use the Kubernetes default. Set to 0 to disable rollback history.
revisionHistoryLimit: ~

# -- Compute resource requests and limits for the manager container.
# See [corev1.ResourceRequirements](https://pkg.go.dev/k8s.io/api/core/v1#ResourceRequirements).
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Container resize policy for in-place pod resizes (InPlacePodVerticalScaling).
# Does not affect how Helm-driven `resources` updates behave — those still roll the Deployment.
# See [corev1.ContainerResizePolicy](https://pkg.go.dev/k8s.io/api/core/v1#ContainerResizePolicy).
resizePolicy: []

serviceAccount:
  # -- Whether to create a ServiceAccount for the operator.
  create: true
  # -- Name of the ServiceAccount to use. Auto-generated from the release name when empty.
  name: ""
  # -- Annotations to add to the ServiceAccount.
  annotations: {}

leaderElection:
  # -- Enable leader election so only one replica is active at a time.
  enabled: true

# -- Operator log verbosity (`--zap-log-level`). Leave empty for the default (`info`).
# Set to `debug` (alias `1`) for per-reconcile progress logs, or `2` for trace-level internals.
logLevel: ""

metrics:
  # -- Enable the metrics endpoint.
  enabled: true
  service:
    # -- Port the metrics Service listens on.
    port: 8443
  # -- Name of a Secret containing `tls.crt`, `tls.key`, and `ca.crt` to use for the metrics
  # server instead of the built-in self-signed certificate. Typically written by cert-manager.
  certSecretName: ""
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor for the operator metrics endpoint.
    # Requires the prometheus-operator CRDs to be installed.
    enabled: false
    # -- How often Prometheus scrapes the metrics endpoint.
    interval: 30s
    # -- Scrape timeout. Empty inherits Prometheus' default.
    scrapeTimeout: ""
    # -- Extra labels on the ServiceMonitor so Prometheus Operator selects it
    # (e.g. `{release: prometheus}` for kube-prometheus-stack).
    labels: {}
    # -- TLS configuration for the ServiceMonitor scrape. The default trusts any certificate,
    # matching the operator's built-in self-signed flow. Override to scrape over verified TLS.
    tlsConfig:
      insecureSkipVerify: true
    # -- Path to the bearer token Prometheus uses to authenticate to the metrics endpoint.
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token

healthProbes:
  # -- Liveness probe for the manager container.
  # See [corev1.Probe](https://pkg.go.dev/k8s.io/api/core/v1#Probe).
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20
  # -- Readiness probe for the manager container.
  # See [corev1.Probe](https://pkg.go.dev/k8s.io/api/core/v1#Probe).
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

# -- Pod-level security context for the manager pod.
# See [corev1.PodSecurityContext](https://pkg.go.dev/k8s.io/api/core/v1#PodSecurityContext).
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context for the manager container.
# See [corev1.SecurityContext](https://pkg.go.dev/k8s.io/api/core/v1#SecurityContext).
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# -- Node selector for the manager pod.
nodeSelector: {}
# -- Tolerations for the manager pod.
# See [corev1.Toleration](https://pkg.go.dev/k8s.io/api/core/v1#Toleration).
tolerations: []
# -- Affinity rules for the manager pod.
# See [corev1.Affinity](https://pkg.go.dev/k8s.io/api/core/v1#Affinity).
affinity: {}

# -- Extra annotations to add to the manager pod.
podAnnotations: {}
# -- Extra labels to add to the manager pod.
podLabels: {}

# -- Namespace watch configuration.
#
# `scope: cluster` (default) watches all namespaces; manager RBAC is rendered as
# ClusterRole + ClusterRoleBinding and requires cluster-scoped RBAC on install.
#
# `scope: namespaces` watches only the namespaces listed in `watch.namespaces`
# (falls back to the release namespace when empty); manager RBAC is rendered as
# Role + RoleBinding per watched namespace with no manager ClusterRole.
# Use on restricted clusters that forbid cluster-scoped RBAC.
watch:
  scope: cluster
  namespaces: []

# -- Additional Kubernetes manifests rendered alongside the chart's own resources.
# Each entry is a YAML object or a string; both are passed through Helm's `tpl` function
# so template expressions such as `{{ .Release.Namespace }}` are resolved.
# Use for release-scoped companion resources (e.g. a cert-manager Certificate, NetworkPolicy,
# or ExternalSecret). Do not use for shared cluster infrastructure such as Gateway controllers,
# CRDs, or shared Gateways — those have their own lifecycle.
extraManifests: []
