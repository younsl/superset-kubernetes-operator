image:
  repository: ghcr.io/apache/superset-kubernetes-operator
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicas: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

serviceAccount:
  create: true
  name: ""
  annotations: {}

leaderElection:
  enabled: true

# logLevel controls the operator's log verbosity (the manager's --zap-log-level
# flag). Leave empty for the default ("info"). Set to "debug" (alias "1") to
# include V(1) per-reconcile progress logs, or "2" for V(2) trace-level
# internals. See the logging policy in the developer guidelines for what each
# level emits.
logLevel: ""

metrics:
  enabled: true
  service:
    port: 8443
  # When non-empty, mount this Secret into the manager pod at
  # /tmp/k8s-metrics-server/metrics-certs and start the manager with
  # --metrics-cert-path so the metrics server presents a real certificate
  # instead of the built-in self-signed one. The Secret must contain
  # tls.crt, tls.key, and (for the scraper's CA bundle) ca.crt.
  # Typically this is the Secret written by a cert-manager Certificate.
  certSecretName: ""
  # serviceMonitor creates a Prometheus Operator ServiceMonitor scraping the
  # operator's controller-runtime metrics. Requires the prometheus-operator
  # CRDs to be installed; otherwise Helm will fail to apply this resource.
  serviceMonitor:
    enabled: false
    # How often Prometheus scrapes the operator metrics endpoint.
    interval: 30s
    # Empty string means "inherit Prometheus' default scrape timeout".
    scrapeTimeout: ""
    # Extra labels applied to the ServiceMonitor so Prometheus Operator
    # selects it (e.g., {release: prometheus} for kube-prometheus-stack).
    labels: {}
    # Free-form ServiceMonitor tlsConfig. The default trusts any cert
    # (matches the operator's built-in self-signed flow). To scrape over
    # real TLS, provision a cert-manager-managed Secret, set metrics.certSecretName
    # above, and override tlsConfig with something like:
    #   tlsConfig:
    #     insecureSkipVerify: false
    #     serverName: <release-name>-superset-operator-metrics.<namespace>.svc
    #     ca:
    #       secret:
    #         name: metrics-server-cert
    #         key: ca.crt
    # The metrics endpoint authenticates scrapers via bearer token, not
    # client cert, so cert/keySecret are unnecessary unless you've
    # configured client-cert auth yourself.
    tlsConfig:
      insecureSkipVerify: true
    # Path to the token Prometheus uses to authenticate to the metrics
    # endpoint. Default matches Prometheus Operator's in-cluster setup.
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token

healthProbes:
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

# watch controls which namespaces the operator reconciles.
#
# scope: cluster (default) — watch all namespaces. Manager RBAC is rendered
#   as ClusterRole + ClusterRoleBinding. Requires cluster-scoped RBAC on
#   install.
# scope: namespaces — watch only the namespaces listed in watch.namespaces
#   (empty list falls back to the release namespace). Manager RBAC is
#   rendered as a Role + RoleBinding per watched namespace; no manager
#   ClusterRole is created. Use this on restricted clusters that forbid
#   cluster-scoped RBAC, or for single-tenant hardening.
#
# Constraints:
# - CRD installation always requires cluster-admin, regardless of scope.
# - Secure metrics auth still needs a cluster-scoped RBAC entry because
#   TokenReview/SubjectAccessReview are cluster-level APIs. On clusters that
#   forbid ClusterRole entirely, set metrics.enabled=false.
# - Updating watch.namespaces requires `helm upgrade` and restarts the
#   manager so the cache picks up the new list.
# - Superset CRs created in namespaces outside watch.namespaces are not
#   reconciled (no log, no status).
watch:
  scope: cluster
  namespaces: []

# extraObjects renders additional Kubernetes manifests alongside the chart's
# own resources. Each list entry is either a YAML object or a string; both
# are passed through Helm's tpl function, so template expressions such as
# {{ .Release.Namespace }} or {{ include "superset-operator.fullname" . }}
# are resolved. Use strings when the manifest itself must contain literal
# template syntax that only renders at install time.
#
# Example:
#   extraObjects:
#     - apiVersion: v1
#       kind: ConfigMap
#       metadata:
#         name: '{{ include "superset-operator.fullname" . }}-extra'
#       data:
#         namespace: '{{ .Release.Namespace }}'
#     - |
#       apiVersion: v1
#       kind: Secret
#       metadata:
#         name: {{ include "superset-operator.fullname" . }}-extra-secret
#       stringData:
#         key: value
extraObjects: []
