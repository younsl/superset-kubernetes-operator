name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# kind_version + kind_checksum live in .github/supported-k8s.json and are kept
# in sync with the kind release by `scripts/sync-supported-versions.sh`. The
# install steps below read them via jq.

jobs:
  unit-integration:
    name: Unit & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Test
        run: make test-unit test-integration
      - name: Upload unit test coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: cover_ut.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload integration test coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: cover.out
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-matrix:
    name: E2E matrix
    runs-on: ubuntu-latest
    outputs:
      supported: ${{ steps.load.outputs.supported }}
      next_version: ${{ steps.load.outputs.next_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: load
        run: |
          {
            echo "supported=$(jq -c .supported .github/supported-k8s.json)"
            echo "next_version=$(jq -r '.next.version // ""' .github/supported-k8s.json)"
          } >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E (${{ matrix.k8s.minor }})
    needs: e2e-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s: ${{ fromJSON(needs.e2e-matrix.outputs.supported) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install kind
        run: |
          KIND_VERSION=$(jq -r .kind_version .github/supported-k8s.json)
          KIND_CHECKSUM=$(jq -r .kind_checksum .github/supported-k8s.json)
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          echo "${KIND_CHECKSUM}  ./kind" | sha256sum -c -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version
      - name: Run E2E tests
        run: make test-e2e
        env:
          KIND_NODE_IMAGE: ${{ matrix.k8s.node_image }}
          KIND_CLUSTER: superset-op-e2e-${{ matrix.k8s.minor }}

  e2e-next:
    name: E2E (next, best-effort)
    needs: e2e-matrix
    if: needs.e2e-matrix.outputs.next_version != ''
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      K8S_NEXT: ${{ needs.e2e-matrix.outputs.next_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install kind
        run: |
          KIND_VERSION=$(jq -r .kind_version .github/supported-k8s.json)
          KIND_CHECKSUM=$(jq -r .kind_checksum .github/supported-k8s.json)
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          echo "${KIND_CHECKSUM}  ./kind" | sha256sum -c -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version
      - name: Build node image for newest Kubernetes release
        run: kind build node-image --type release "${K8S_NEXT}" --image "kindest/node:${K8S_NEXT}-local"
      - name: Run E2E tests
        run: make test-e2e
        env:
          KIND_NODE_IMAGE: kindest/node:${{ env.K8S_NEXT }}-local
          KIND_CLUSTER: superset-op-e2e-next
