name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-integration:
    name: Unit & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Test
        run: make test-unit test-integration
      - name: Upload unit test coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: cover_ut.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload integration test coverage
        if: always()
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: cover.out
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install kind
        run: |
          KIND_VERSION="v0.31.0"
          KIND_CHECKSUM="eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa"
          curl -fsSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          echo "${KIND_CHECKSUM}  ./kind" | sha256sum -c -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version
      - name: Run E2E tests
        run: make test-e2e
