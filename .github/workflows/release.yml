name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/apache/superset-kubernetes-operator
  HELM_REGISTRY: oci://ghcr.io/apache/superset-kubernetes-operator/charts

permissions:
  contents: read
  packages: write
  id-token: write # Required for cosign OIDC signing

jobs:
  release:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # On every build (main + tags): full commit SHA, immutably pinnable
            type=sha,prefix=sha-,format=long
            # On push to main: floating dev tag (latest main build)
            type=raw,value=dev,enable={{is_default_branch}}
            # On tag push: strip 'v' prefix (v0.1.0 -> 0.1.0, v0.1.0-rc1 -> 0.1.0-rc1)
            type=semver,pattern={{version}}
            # On non-prerelease tag push: latest
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Install Helm
        run: bash scripts/install-helm.sh

      - name: Set chart version for release tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/superset-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/superset-operator/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p charts/superset-operator/crds
          cp config/crd/bases/*.yaml charts/superset-operator/crds/
          helm package charts/superset-operator

      - name: Push Helm chart to GHCR OCI
        run: |
          helm push superset-operator-*.tgz ${{ env.HELM_REGISTRY }}

      - name: Sign Helm chart with cosign
        run: |
          CHART_VERSION="$(grep '^version:' charts/superset-operator/Chart.yaml | awk '{print $2}')"
          CHART_REF="${{ env.HELM_REGISTRY }}/superset-operator:${CHART_VERSION}"
          cosign sign --yes "${CHART_REF#oci://}"
